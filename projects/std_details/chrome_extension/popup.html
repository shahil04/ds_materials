<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      width: 280px;
      padding: 15px;
      margin: 0;
      background-color: #f9f9f9;
    }

    h3 {
      margin-top: 0;
      color: #333;
      font-size: 16px;
      border-bottom: 2px solid #4CAF50;
      padding-bottom: 5px;
    }

    label {
      font-size: 12px;
      color: #555;
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }

    input[type="number"],
    input[type="text"] {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 10px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 5px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.2s;
    }

    #startBtn {
      background-color: #4CAF50;
      color: white;
    }

    #startBtn:hover:not(:disabled) {
      background-color: #45a049;
    }

    #startBtn:disabled {
      background-color: #a5d6a7;
      cursor: not-allowed;
    }

    #downloadBtn {
      background-color: #2196F3;
      color: white;
      margin-top: 15px;
    }

    #downloadBtn:hover {
      background-color: #0b7dda;
    }

    #clearBtn {
      background-color: #f44336;
      color: white;
    }

    #clearBtn:hover {
      background-color: #da190b;
    }

    .status-container {
      margin-top: 15px;
      padding: 10px;
      background-color: #e8f5e9;
      border-radius: 4px;
      border-left: 4px solid #4caf50;
    }

    .status {
      font-size: 13px;
      color: #2e7d32;
      font-weight: 500;
    }

    .help-text {
      font-size: 11px;
      color: #777;
      margin-top: -5px;
      margin-bottom: 10px;
      display: block;
      font-style: italic;
    }
  </style>
</head>

<body>
  <h3>🎓 Student Scraper</h3>

  <label for="customUrl">Specific URL (Optional):</label>
  <input type="text" id="customUrl" placeholder="http://pulse.itvedant.com/student/...">
  <span class="help-text">Leave blank to use your current tab's URL.</span>

  <label for="pages">Number of pages to scrape:</label>
  <input type="number" id="pages" value="5" min="1" max="100">

  <button id="startBtn">▶ Start Automatic Scraping</button>
  <button id="downloadBtn">📥 Download CSV</button>
  <button id="clearBtn">🗑️ Clear Saved Data</button>

  <div class="status-container">
    <div class="status" id="status">Ready to scrape.</div>
  </div>

  <script src="popup.js"></script>
</body>

</html>

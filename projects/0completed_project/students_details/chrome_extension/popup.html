<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 280px;
            padding: 15px;
            margin: 0;
            background-color: #f9f9f9;
        }

        h3 {
            margin-top: 0;
            color: #333;
            font-size: 16px;
            border-bottom: 2px solid #2196F3;
            padding-bottom: 5px;
        }

        label {
            font-size: 12px;
            color: #555;
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }

        input[type="number"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
        }

        .flex-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .flex-row>div {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        #startBtn {
            background-color: #4CAF50;
            color: white;
        }

        #startBtn:hover:not(:disabled) {
            background-color: #45a049;
        }

        #startBtn:disabled {
            background-color: #a5d6a7;
            cursor: not-allowed;
        }

        #downloadBtn {
            background-color: #2196F3;
            color: white;
            margin-top: 15px;
        }

        #downloadBtn:hover {
            background-color: #0b7dda;
        }

        #clearBtn {
            background-color: #f44336;
            color: white;
        }

        #clearBtn:hover {
            background-color: #da190b;
        }

        .status-container {
            margin-top: 15px;
            padding: 10px;
            background-color: #e3f2fd;
            border-radius: 4px;
            border-left: 4px solid #2196F3;
        }

        .status {
            font-size: 13px;
            color: #1565c0;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <h3>👤 Profile Scraper</h3>

    <div class="flex-row">
        <div>
            <label for="startId">Start ID:</label>
            <input type="number" id="startId" placeholder="e.g. 25025">
        </div>
        <div>
            <label for="endId">End ID:</label>
            <input type="number" id="endId" placeholder="e.g. 25035">
        </div>
    </div>

    <button id="startBtn">▶ Start Automatic Scraping</button>
    <button id="downloadBtn">📥 Download CSV</button>
    <button id="clearBtn">🗑️ Clear Saved Data</button>

    <div class="status-container">
        <div class="status" id="status">Ready to scrape profiles.</div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
